<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <meta name="description" content="Guess the artist, song, and album from a single line of a lyric." />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lyric Hunt" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />

  <link rel="stylesheet" href="./fonts/fonts.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <main id="view"></main>
  <script type="module" src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
      // Auto-reload when a fresh SW activates as an update.
      // pwa-gotchas/reference/sw-update-reload.md
      let reloadingForUpdate = false;
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'RELOAD' && !reloadingForUpdate) {
          reloadingForUpdate = true;
          location.reload();
        }
      });
    }
  </script>
</body>
</html>
